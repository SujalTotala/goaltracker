<!DOCTYPE html>
<html>
<head>
    <title>Goal Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light" onload="loadGoals()">

<div class="container-fluid mt-4">

    <h2 class="text-center mb-4">🚀 Goal Tracker Dashboard</h2>

    <div class="row">

        <!-- LEFT SIDE (Daily Goals) -->
        <div class="col-md-6">

            <h4>📅 Daily Goals</h4>

            <div class="input-group mb-3">
                <input type="text" id="title" class="form-control" placeholder="Enter goal">
                <button class="btn btn-primary" onclick="addGoal()">Add</button>
            </div>

            <!-- Progress -->
            <h6 id="dailyProgress">Today: 0%</h6>

            <div class="progress mb-3">
                <div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>
            </div>

            <!-- Goal List -->
            <ul id="goalList" class="list-group"></ul>

        </div>

        <!-- RIGHT SIDE (Dashboard) -->
        <div class="col-md-6">

            <h4>📊 Monthly Dashboard</h4>

            <h6 id="streak">🔥 Streak: 0 days</h6>
            <h6 id="monthlyProgress">Month: 0%</h6>

            <!-- Heatmap -->
            <div id="heatmap" class="mt-3"></div>

        </div>

    </div>
</div>

<script>
    const API = "http://localhost:8081";

    // LOAD GOALS
    function loadGoals() {
        fetch(API + "/goals")
            .then(res => res.json())
            .then(data => {

                const list = document.getElementById("goalList");
                list.innerHTML = "";

                let today = new Date().toISOString().split("T")[0];

                let total = 0;
                let completed = 0;

                data.forEach(g => {

                    if (g.date === today) {

                        total++;
                        if (g.completed) completed++;

                        const li = document.createElement("li");
                        li.className = "list-group-item d-flex justify-content-between align-items-center";

                        li.innerHTML = `
                        <div>
                            <input type="checkbox" ${g.completed ? "checked" : ""}
                            onchange="toggleComplete(${g.id}, '${g.title}', ${g.completed})">

                            <span style="text-decoration:${g.completed ? 'line-through' : 'none'}">
                                ${g.title} (${g.badge})
                            </span>
                        </div>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteGoal(${g.id})">Delete</button>
                    `;

                        list.appendChild(li);
                    }
                });

                // DAILY PROGRESS
                let percent = total === 0 ? 0 : (completed / total) * 100;

                document.getElementById("dailyProgress").innerText =
                    `Today: ${completed}/${total} (${percent.toFixed(0)}%)`;

                document.getElementById("progressBar").style.width = percent + "%";

                // OTHER FEATURES
                generateHeatmap(data);
                calculateMonthly(data);
                showStreak(data);
            });
    }

    // ADD GOAL
    function addGoal() {
        const title = document.getElementById("title").value;

        fetch(API + "/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: title,
                completed: false
            })
        }).then(() => {
            document.getElementById("title").value = "";
            loadGoals();
        });
    }

    // DELETE
    function deleteGoal(id) {
        fetch(API + "/goals/" + id, {
            method: "DELETE"
        }).then(() => loadGoals());
    }

    // TOGGLE COMPLETE
    function toggleComplete(id, title, completed) {
        fetch(API + "/goals/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: title,
                completed: !completed
            })
        }).then(() => loadGoals());
    }

    // MONTHLY CALCULATION
    function calculateMonthly(data) {
        let total = 0;
        let completed = 0;

        let now = new Date();

        data.forEach(g => {
            let d = new Date(g.date);

            if (d.getMonth() === now.getMonth()) {
                total++;
                if (g.completed) completed++;
            }
        });

        let percent = total === 0 ? 0 : (completed / total) * 100;

        document.getElementById("monthlyProgress").innerText =
            `Month: ${completed}/${total} (${percent.toFixed(0)}%)`;
    }

    // HEATMAP
    function generateHeatmap(data) {
        const container = document.getElementById("heatmap");
        container.innerHTML = "";

        for (let i = 1; i <= 30; i++) {

            let dayData = data.filter(g =>
                new Date(g.date).getDate() === i
            );

            let total = dayData.length;
            let completed = dayData.filter(g => g.completed).length;

            let percent = total === 0 ? 0 : completed / total;

            let color = "#eee";
            if (percent === 1) color = "green";
            else if (percent > 0) color = "orange";

            let cell = document.createElement("div");
            cell.style.width = "20px";
            cell.style.height = "20px";
            cell.style.display = "inline-block";
            cell.style.margin = "2px";
            cell.style.background = color;

            cell.title = `Day ${i}: ${completed}/${total}`;

            container.appendChild(cell);
        }
    }

    // STREAK
    function showStreak(data) {
        let streak = Math.max(...data.map(g => g.streak || 0));
        document.getElementById("streak").innerText =
            `🔥 Streak: ${streak} days`;
    }
</script>

</body>
</html>
